<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Shirt Designer Demo</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
      }

      body {
        background: linear-gradient(135deg, #f5f7fb, #edf2f8);
        font-family: "Segoe UI", "PingFang SC", sans-serif;
      }

      #demo-shell {
        box-sizing: border-box;
        height: 100%;
        min-height: 0;
        padding: 20px;
        overflow: auto;
      }

      #demo-card {
        height: min(100%, 820px);
        max-height: 820px;
        max-width: 1200px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #d8dee8;
        border-radius: 14px;
        overflow: hidden;
      }

      #app {
        height: 100%;
        min-height: 0;
      }

      #toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        min-width: 260px;
        max-width: 420px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(30, 37, 48, 0.92);
        color: #ffffff;
        font-size: 13px;
        line-height: 1.4;
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      #toast.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="demo-shell">
      <div id="demo-card">
        <div id="app"></div>
      </div>
    </div>
    <div id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
